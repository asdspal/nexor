name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: |
            nexor-frontend/package-lock.json
            nexor-contracts/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./nexor-frontend
        run: npm install

      - name: Lint frontend
        working-directory: ./nexor-frontend
        run: npm run lint

      - name: Build frontend
        working-directory: ./nexor-frontend
        run: npm run build

      - name: Install contracts dependencies
        working-directory: ./nexor-contracts
        run: npm install

      - name: Test contracts
        working-directory: ./nexor-contracts
        run: npm test -- --runInBand || npm run test || true
